<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已生成的规划方案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #20242d;
            --muted: #7b8493;
            --blue: #2c36bd;
            --blue-soft: #e2f4ff;
            --cyan: #28a9e0;
            --green: #28c978;
            --surface: #f6f7fb;
            --panel: #ffffff;
            --line: #e8edf4;
            --shadow: 0 18px 40px rgba(31, 41, 55, 0.08);
            --radius: 8px;
        }

        body {
            min-height: 100vh;
            background: #ffffff;
            color: var(--ink);
            font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            line-height: 1.5;
        }

        button,
        a {
            font: inherit;
        }

        .dashboard {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 264px minmax(0, 1fr);
            background: #ffffff;
        }

        .sidebar {
            background: #dff3ff;
            padding: 30px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 34px;
            padding: 0 12px;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: #172033;
            color: #ffffff;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 17px;
        }

        .brand-name {
            font-size: 25px;
            font-weight: 800;
            letter-spacing: 0;
            color: #1f2430;
        }

        .nav {
            display: grid;
            gap: 10px;
        }

        .nav-link {
            min-height: 50px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            border-radius: 8px;
            color: #343b49;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        .nav-link.active {
            background: var(--blue);
            color: #ffffff;
            box-shadow: 0 14px 24px rgba(44, 54, 189, 0.18);
        }

        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 13px 0 0 currentColor, 0 13px 0 currentColor, 13px 13px 0 currentColor;
            margin-right: 12px;
        }

        .nav-symbol {
            width: 28px;
            color: #2c36bd;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
        }

        .nav-link.active .nav-symbol {
            color: #ffffff;
        }

        .main {
            min-width: 0;
            padding: 34px 40px 56px;
            background: #ffffff;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 32px;
        }

        .title-wrap {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
        }

        .menu-button {
            width: 22px;
            height: 18px;
            border: 0;
            background: linear-gradient(var(--blue), var(--blue)) 0 0 / 22px 3px no-repeat,
                linear-gradient(var(--blue), var(--blue)) 0 8px / 18px 3px no-repeat,
                linear-gradient(var(--blue), var(--blue)) 0 16px / 22px 3px no-repeat;
            cursor: pointer;
        }

        h1 {
            font-size: 25px;
            line-height: 1.2;
            font-weight: 800;
            color: #252934;
            letter-spacing: 0;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        .profile-text {
            text-align: right;
            font-size: 12px;
            color: var(--muted);
        }

        .profile-text strong {
            display: block;
            color: #252934;
            font-size: 13px;
            font-weight: 700;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #ffc21a;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-weight: 800;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(150px, 1fr));
            gap: 28px;
            margin-bottom: 28px;
        }

        .stat-card {
            min-height: 150px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--blue);
            color: #ffffff;
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: 800;
        }

        .stat-label {
            color: #9297a1;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .stat-value {
            color: #252934;
            font-size: 24px;
            font-weight: 800;
        }

        .content-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 224px;
            gap: 28px;
            align-items: start;
        }

        .plans-section {
            min-width: 0;
        }

        .section-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 26px;
            margin-bottom: 28px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-bottom: 22px;
        }

        .section-title {
            color: var(--blue);
            font-size: 24px;
            line-height: 1.25;
            font-weight: 800;
        }

        .back-button {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 16px;
            border: 1px solid #2b3442;
            border-radius: 4px;
            color: #2b3442;
            text-decoration: none;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
        }

        .plans-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 28px;
        }

        .plan-item {
            min-width: 0;
            min-height: 260px;
            background: #dff3ff;
            color: #252934;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .plan-top {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .plan-avatar {
            width: 56px;
            height: 56px;
            flex: 0 0 auto;
            border-radius: 50%;
            background: #ffffff;
            color: var(--blue);
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: 800;
            box-shadow: inset 0 0 0 6px rgba(44, 54, 189, 0.12);
        }

        .plan-item.major-math {
            background: var(--blue);
            color: #ffffff;
        }

        .plan-item.major-physics {
            background: #dff3ff;
        }

        .plan-item.major-chemistry {
            background: #23b8a6;
            color: #ffffff;
        }

        .plan-item.major-business {
            background: #fff2c5;
        }

        .plan-item.major-humanities {
            background: #e9e4ff;
        }

        .plan-item.major-default {
            background: #eef2f7;
        }

        .plan-item.major-math .plan-title,
        .plan-item.major-math .plan-meta,
        .plan-item.major-math .plan-date,
        .plan-item.major-chemistry .plan-title,
        .plan-item.major-chemistry .plan-meta,
        .plan-item.major-chemistry .plan-date {
            color: #ffffff;
        }

        .plan-item.major-chemistry .plan-avatar {
            color: #0f8f81;
        }

        .plan-title {
            min-width: 0;
            color: #252934;
            font-size: 23px;
            line-height: 1.2;
            font-weight: 800;
            word-break: break-word;
        }

        .plan-badge {
            align-self: flex-start;
            min-height: 28px;
            padding: 4px 12px;
            border-radius: 999px;
            background: #20242d;
            color: #ffffff;
            font-size: 13px;
            line-height: 1.4;
        }

        .plan-meta,
        .plan-date {
            color: #3f4a57;
            font-size: 15px;
            word-break: break-word;
        }

        .plan-meta strong,
        .plan-date strong {
            font-weight: 700;
        }

        .plan-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .view-button,
        .download-button {
            min-height: 38px;
            border: 0;
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease;
        }

        .view-button {
            background: var(--cyan);
        }

        .download-button {
            background: var(--green);
        }

        .view-button:hover,
        .download-button:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }

        .side-panel {
            display: grid;
            gap: 28px;
        }

        .quote-card,
        .info-card {
            border-radius: 8px;
            background: #2badde;
            color: #ffffff;
            padding: 26px 24px;
            min-height: 220px;
        }

        .quote-mark {
            font-size: 64px;
            line-height: 0.8;
            opacity: 0.55;
        }

        .quote-card strong {
            display: block;
            margin-top: 8px;
            font-size: 33px;
            line-height: 1.05;
            letter-spacing: 0;
        }

        .quote-card span {
            display: block;
            margin-top: 8px;
            font-size: 18px;
            line-height: 1.35;
        }

        .info-card {
            background: var(--surface);
            color: #252934;
            min-height: auto;
        }

        .info-card h2 {
            color: var(--blue);
            font-size: 22px;
            line-height: 1.25;
            margin-bottom: 18px;
        }

        .info-list {
            display: grid;
            gap: 12px;
            color: #526071;
            font-size: 14px;
        }

        .loading,
        .empty-state {
            background: var(--surface);
            border-radius: 8px;
            padding: 64px 24px;
            text-align: center;
            color: #687587;
            font-size: 16px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 22px;
            height: 22px;
            margin-left: 12px;
            border: 3px solid #dbe9f2;
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1240px) {
            .stats {
                grid-template-columns: repeat(2, minmax(150px, 1fr));
            }

            .plans-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 980px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                height: auto;
                padding: 18px;
            }

            .brand {
                margin-bottom: 18px;
            }

            .nav {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .side-panel {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 700px) {
            .main {
                padding: 24px 18px 40px;
            }

            .topbar,
            .section-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .profile {
                display: none;
            }

            .stats,
            .plans-list,
            .side-panel,
            .nav {
                grid-template-columns: 1fr;
            }

            .section-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">P</div>
                <div class="brand-name">planschool</div>
            </div>

            <nav class="nav" aria-label="主导航">
                <a class="nav-link active" href="/view_plans.html"><span class="nav-dot" aria-hidden="true"></span>规划方案</a>
                <a class="nav-link" href="/"><span class="nav-symbol" aria-hidden="true">+</span>新建规划</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="title-wrap">
                    <button class="menu-button" type="button" aria-label="菜单"></button>
                    <h1>Planning Dashboard</h1>
                </div>
                <div class="profile" aria-label="当前用户">
                    <div class="profile-text">
                        <strong>升学规划系统</strong>
                        <span>Advisor Workspace</span>
                    </div>
                    <div class="avatar">A</div>
                </div>
            </header>

            <section class="stats" aria-label="方案概览">
                <article class="stat-card">
                    <div class="stat-icon">D</div>
                    <div>
                        <div class="stat-label">Dashboard</div>
                        <div class="stat-value">方案库</div>
                    </div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon">R</div>
                    <div>
                        <div class="stat-label">Reports</div>
                        <div class="stat-value" id="planCount">--</div>
                    </div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon">M</div>
                    <div>
                        <div class="stat-label">Markdown</div>
                        <div class="stat-value">已排版</div>
                    </div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon">Y</div>
                    <div>
                        <div class="stat-label">Year</div>
                        <div class="stat-value" id="currentYear">2026</div>
                    </div>
                </article>
            </section>

            <div class="content-grid">
                <section class="plans-section">
                    <div class="section-card">
                        <div class="section-head">
                            <h2 class="section-title">已生成的规划方案</h2>
                            <a href="/" class="back-button">返回填写页面</a>
                        </div>

                        <div id="loading" class="loading" style="display: block;">正在加载方案列表</div>
                        <ul id="plansList" class="plans-list" style="display: none;"></ul>
                        <div id="emptyState" class="empty-state" style="display: none;">
                            <p>暂无已生成的规划方案</p>
                            <a href="/" class="back-button">去生成新方案</a>
                        </div>
                    </div>
                </section>

                <aside class="side-panel">
                    <section class="quote-card" aria-label="学习标语">
                        <div class="quote-mark">"</div>
                        <strong>PLAN SMART</strong>
                        <span>让每一份升学方案都清晰、可读、可行动。</span>
                    </section>

                    <section class="info-card" aria-label="使用提示">
                        <h2>快速操作</h2>
                        <div class="info-list">
                            <p>查看内容会打开报告式阅读页。</p>
                            <p>下载文件会保留原始 Markdown。</p>
                            <p>返回填写页面可生成新的规划。</p>
                        </div>
                    </section>
                </aside>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            fetchPlans();
        });

        async function fetchPlans() {
            try {
                const response = await fetch('/plans');

                if (!response.ok) {
                    throw new Error(`获取方案列表失败: ${response.status}`);
                }

                const plans = await response.json();
                displayPlans(plans);
            } catch (error) {
                console.error('获取方案列表时发生错误:', error);
                showErrorMessage('获取方案列表失败');
            }
        }

        function displayPlans(plans) {
            const loading = document.getElementById('loading');
            const plansList = document.getElementById('plansList');
            const emptyState = document.getElementById('emptyState');
            const planCount = document.getElementById('planCount');

            loading.style.display = 'none';
            planCount.textContent = plans.length;

            if (plans.length === 0) {
                emptyState.style.display = 'block';
                plansList.style.display = 'none';
                return;
            }

            plansList.style.display = 'grid';
            emptyState.style.display = 'none';
            plansList.innerHTML = '';

            plans.forEach(plan => {
                const li = document.createElement('li');

                const filenameParts = plan.filename.replace('.md', '').split('_');
                const studentName = filenameParts[0] || '未知学生';
                const institution = filenameParts[1] || '未知院校';
                const major = filenameParts.slice(2).join('_') || '未知专业';
                const initial = studentName.trim().slice(0, 1).toUpperCase() || 'P';
                li.className = `plan-item ${majorClass(major)}`;

                li.innerHTML = `
                    <div class="plan-top">
                        <div class="plan-avatar">${escapeHtml(initial)}</div>
                        <div class="plan-title">${escapeHtml(studentName)} 的规划方案</div>
                    </div>
                    <div class="plan-badge">Report</div>
                    <div class="plan-meta"><strong>院校:</strong> ${escapeHtml(institution)} | <strong>专业:</strong> ${escapeHtml(major)}</div>
                    <div class="plan-date"><strong>创建时间:</strong> ${new Date(plan.mtime * 1000).toLocaleString()}</div>
                    <div class="plan-actions">
                        <button class="view-button" onclick="viewPlan('${escapeAttribute(plan.filename)}')">查看内容</button>
                        <button class="download-button" onclick="downloadPlan('${escapeAttribute(plan.filename)}')">下载文件</button>
                    </div>
                `;

                plansList.appendChild(li);
            });
        }

        function viewPlan(filename) {
            window.open(`/plan_report?filename=${encodeURIComponent(filename)}`, '_blank');
        }

        function downloadPlan(filename) {
            const a = document.createElement('a');
            a.href = `/download_plan?filename=${encodeURIComponent(filename)}`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function showErrorMessage(message) {
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');

            loading.style.display = 'none';
            emptyState.style.display = 'block';
            emptyState.innerHTML = `<p>${escapeHtml(message)}</p><a href="/" class="back-button">返回填写页面</a>`;
        }

        function majorClass(major) {
            const text = String(major || '').toLowerCase();
            if (text.includes('数学') || text.includes('计算机') || text.includes('math') || text.includes('computer')) {
                return 'major-math';
            }
            if (text.includes('物理') || text.includes('工程') || text.includes('physics') || text.includes('engineering')) {
                return 'major-physics';
            }
            if (text.includes('化学') || text.includes('生物') || text.includes('chem') || text.includes('bio')) {
                return 'major-chemistry';
            }
            if (text.includes('经济') || text.includes('商') || text.includes('business') || text.includes('econom')) {
                return 'major-business';
            }
            if (text.includes('人文') || text.includes('社科') || text.includes('history') || text.includes('social')) {
                return 'major-humanities';
            }
            return 'major-default';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttribute(text) {
            return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }
    </script>
</body>
</html>
